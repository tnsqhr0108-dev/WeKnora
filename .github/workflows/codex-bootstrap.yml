name: Codex Bootstrap Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository state
        run: |
          pwd
          git branch --show-current || true
          git rev-parse HEAD
          git status --short
          find . -maxdepth 3 -type f | sort
