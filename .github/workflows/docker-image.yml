name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually build and push Docker images. Requires DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD secrets."
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  explain-disabled:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why Docker publish is skipped
        run: |
          echo "Docker publishing is disabled by default."
          echo "This repository receives many documentation/Codex-policy commits."
          echo "To avoid failing every main-branch push when Docker Hub secrets are missing, image builds only run for v* tags or manual workflow_dispatch with publish=true."
          echo "Required secrets for publishing: DOCKERHUB_USERNAME, DOCKERHUB_PASSWORD."

  build-ui:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weknora-ui
      - name: Build ui Image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: frontend/Dockerfile
          context: ./frontend
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=build-ui
          cache-to: type=gha,scope=build-ui,mode=max

  build-docreader:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weknora-docreader
      - name: Build docreader Image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.docreader
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=build-docreader
          cache-to: type=gha,scope=build-docreader,mode=max

  build-sandbox:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weknora-sandbox
      - name: Build sandbox Image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.sandbox
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=build-sandbox
          cache-to: type=gha,scope=build-sandbox,mode=max

  build-app:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runs: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runs: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs }}
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weknora-app
      - name: Prepare version info
        id: version
        run: |
          eval "$(./scripts/get_version.sh env)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          ./scripts/get_version.sh info
      - name: Build app Image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: docker/Dockerfile.app
          context: .
          build-args: |
            ${{ format('VERSION_ARG={0}', steps.version.outputs.version) }}
            ${{ format('COMMIT_ID_ARG={0}', steps.version.outputs.commit_id) }}
            ${{ format('BUILD_TIME_ARG={0}', steps.version.outputs.build_time) }}
            ${{ format('GO_VERSION_ARG={0}', steps.version.outputs.go_version) }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weknora-app
          cache-from: type=gha,scope=build-app-${{ matrix.arch }}
          cache-to: type=gha,scope=build-app-${{ matrix.arch }},mode=max
