name: Repository Health Check

on:
  push:
    branches:
      - main
    paths:
      - 'AGENTS.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/repository-health.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show state
        run: |
          pwd
          git branch --show-current || true
          git rev-parse HEAD
          git status --short
          find . -maxdepth 3 -type f | sort | sed -n '1,240p'
      - name: Generate 1000+ feature register
        run: |
          python3 scripts/generate_feature_register_1000plus.py --check
          test -f docs/FEATURE_REGISTER_1000PLUS_KO.md
          grep -n '총 항목 수' docs/FEATURE_REGISTER_1000PLUS_KO.md
          grep -n 'F1000' docs/FEATURE_REGISTER_1000PLUS_KO.md
      - name: Check Codex loader files
        run: |
          test -f AGENTS.md
          test -f docs/CODEX_ANSWER_QUALITY_POLICY.md
          test -f docs/CODEX_1000PLUS_FEATURE_LOADER_KO.md
          test -f codex-protect/README_KO.md
          test -f codex-protect/LOAD_ORDER.md
